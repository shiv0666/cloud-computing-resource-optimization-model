<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudSim Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .refresh-info {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
        }
        .btn-refresh {
            background: white;
            color: #667eea;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 10px;
        }
        .btn-refresh:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            padding: 25px;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .metric {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .metric-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .chart-container {
            position: relative;
            height: 350px;
            margin-bottom: 30px;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin: 5px;
        }
        .status-balanced {
            background: #d4edda;
            color: #155724;
        }
        .status-underutilized {
            background: #cfe2ff;
            color: #084298;
        }
        .status-overutilized {
            background: #f8d7da;
            color: #842029;
        }
        .vm-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .vm-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        .vm-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .vm-table tr:hover {
            background: #f8f9fa;
        }
        .timeline-item {
            padding: 12px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .timeline-time {
            font-weight: 600;
            color: #667eea;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .chart-container {
                height: 250px;
            }
            .metrics-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-cloud"></i> CloudSim Analysis</h1>
        <div class="refresh-info">
            Last updated: <span id="lastUpdated">--:--:--</span>
            <button class="btn-refresh" onclick="manualRefresh()">
                <i class="fas fa-sync-alt" id="refreshIcon"></i> Refresh
            </button>
        </div>
    </div>

    <div class="container-lg">
        <!-- Summary Metrics -->
        <div class="card">
            <div class="metrics-row">
                <div class="metric">
                    <div class="metric-label">Total VMs</div>
                    <div class="metric-value" id="totalVMs">-</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Total Hosts</div>
                    <div class="metric-value" id="totalHosts">-</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Total Cloudlets</div>
                    <div class="metric-value" id="totalCloudlets">-</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Sim Time</div>
                    <div class="metric-value" id="simTime">-</div>
                </div>
            </div>
        </div>

        <!-- CPU Utilization -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-microchip"></i> CPU Utilization (MIPS)
            </div>
            <div class="chart-container">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>

        <!-- Memory Utilization -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-memory"></i> Memory Utilization (MB)
            </div>
            <div class="chart-container">
                <canvas id="memoryChart"></canvas>
            </div>
        </div>

        <!-- Execution Timeline -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-hourglass-end"></i> Cloudlet Execution Timeline
            </div>
            <div id="timelineContainer" style="max-height: 400px; overflow-y: auto;">
                <!-- Timeline items will be inserted here -->
            </div>
        </div>

        <!-- VM Status & Utilization -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-server"></i> Virtual Machine Details
            </div>
            <table class="vm-table">
                <thead>
                    <tr>
                        <th>VM ID</th>
                        <th>RAM (MB)</th>
                        <th>Cloudlets</th>
                        <th>Total Exec Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="vmTableBody">
                    <!-- Rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let simulationData = null;
        let charts = {};
        let lastDataHash = null;
        let autoRefreshInterval = null;

        function hashData(data) {
            return JSON.stringify(data).split('').reduce((a, b) => {a = ((a << 5) - a) + b.charCodeAt(0); return a & a;}, 0);
        }

        async function loadData() {
            try {
                const response = await fetch('simulation-data.json?t=' + Date.now());
                const newData = await response.json();
                const newHash = hashData(newData);
                
                if (newHash !== lastDataHash) {
                    simulationData = newData;
                    lastDataHash = newHash;
                    updateDashboard();
                    updateTimestamp();
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Error loading data:', error);
                return false;
            }
        }

        function updateDashboard() {
            document.getElementById('totalVMs').textContent = simulationData.totalVMs;
            document.getElementById('totalHosts').textContent = simulationData.totalHosts;
            document.getElementById('totalCloudlets').textContent = simulationData.cloudlets.length;
            const maxFinish = Math.max(...simulationData.cloudlets.map(c => c.finishTime));
            document.getElementById('simTime').textContent = maxFinish.toFixed(1) + 's';

            updateCPUChart();
            updateMemoryChart();
            updateTimeline();
            updateVMTable();
        }

        function updateCPUChart() {
            const vmData = {};
            simulationData.cloudlets.forEach(c => {
                if (!vmData[c.vmId]) vmData[c.vmId] = 0;
                vmData[c.vmId] += c.length;
            });

            const ctx = document.getElementById('cpuChart').getContext('2d');
            if (charts.cpu) charts.cpu.destroy();
            charts.cpu = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(vmData).map(v => 'VM ' + v),
                    datasets: [{
                        label: 'Total MIPS Used',
                        data: Object.values(vmData),
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function updateMemoryChart() {
            const vmRam = {0: 512, 1: 640, 2: 768, 3: 896, 4: 1024};
            const labels = Object.keys(vmRam).map(v => 'VM ' + v);
            const data = Object.values(vmRam);

            const ctx = document.getElementById('memoryChart').getContext('2d');
            if (charts.memory) charts.memory.destroy();
            charts.memory = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe'],
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right' },
                        tooltip: { callbacks: { label: ctx => ctx.label + ': ' + ctx.parsed + ' MB' } }
                    }
                }
            });
        }

        function updateTimeline() {
            const sorted = [...simulationData.cloudlets].sort((a, b) => a.startTime - b.startTime);
            const html = sorted.map(c => `
                <div class="timeline-item">
                    <span class="timeline-time">Cloudlet ${c.cloudletId}</span> (VM ${c.vmId})
                    <br><small>Start: ${c.startTime.toFixed(1)}s | Finish: ${c.finishTime.toFixed(1)}s | Duration: ${c.executionTime.toFixed(1)}s</small>
                </div>
            `).join('');
            document.getElementById('timelineContainer').innerHTML = html;
        }

        function updateVMTable() {
            const vmStats = {};
            simulationData.cloudlets.forEach(c => {
                if (!vmStats[c.vmId]) vmStats[c.vmId] = { cloudlets: 0, totalExec: 0 };
                vmStats[c.vmId].cloudlets++;
                vmStats[c.vmId].totalExec += c.executionTime;
            });

            const vmRam = {0: 512, 1: 640, 2: 768, 3: 896, 4: 1024};
            const html = Object.keys(vmStats).map(vmId => {
                const stats = vmStats[vmId];
                const ram = vmRam[vmId];
                let status = 'Balanced';
                let statusClass = 'status-balanced';
                
                if (stats.cloudlets === 0) {
                    status = 'Underutilized';
                    statusClass = 'status-underutilized';
                } else if (stats.cloudlets > 3) {
                    status = 'Overutilized';
                    statusClass = 'status-overutilized';
                }

                return `
                    <tr>
                        <td><strong>VM ${vmId}</strong></td>
                        <td>${ram}</td>
                        <td>${stats.cloudlets}</td>
                        <td>${stats.totalExec.toFixed(2)}s</td>
                        <td><span class="status-badge ${statusClass}">${status}</span></td>
                    </tr>
                `;
            }).join('');

            document.getElementById('vmTableBody').innerHTML = html;
        }

        async function manualRefresh() {
            const icon = document.getElementById('refreshIcon');
            icon.style.animation = 'spin 0.6s linear';
            await loadData();
            icon.style.animation = '';
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('lastUpdated').textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(loadData, 5000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            startAutoRefresh();
        });

        const style = document.createElement('style');
        style.textContent = `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
